<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景星球 -->
  <circle cx="200" cy="150" r="120" fill="#F0F4FF" />
  <circle cx="200" cy="150" r="100" fill="#E6EDFF" />

  <!-- 404 数字 -->
  <text x="85" y="180" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#165DFF">4</text>
  <text x="185" y="180" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#165DFF">0</text>
  <text x="275" y="180" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#165DFF">4</text>

  <!-- 装饰星星 -->
  <circle cx="80" cy="60" r="4" fill="#165DFF" opacity="0.6" />
  <circle cx="320" cy="80" r="3" fill="#165DFF" opacity="0.4" />
  <circle cx="50" cy="120" r="2" fill="#165DFF" opacity="0.3" />
  <circle cx="350" cy="180" r="3" fill="#165DFF" opacity="0.5" />
  <circle cx="100" cy="240" r="2" fill="#165DFF" opacity="0.4" />
  <circle cx="300" cy="220" r="4" fill="#165DFF" opacity="0.3" />

  <!-- 小行星 -->
  <ellipse cx="310" cy="50" rx="30" ry="15" fill="#4080FF" opacity="0.3" />

  <!-- 丢失的文档 -->
  <rect x="160" y="200" width="80" height="12" rx="6" fill="#C9D8FF" />
  <rect x="160" y="220" width="60" height="8" rx="4" fill="#C9D8FF" />
  <rect x="160" y="235" width="70" height="8" rx="4" fill="#C9D8FF" />
</svg>
